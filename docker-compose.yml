services:
  grandstay-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grandstay-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: ${DB_HOST:?DB_HOST requerido}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:?DB_NAME requerido}
      DB_USER: ${DB_USER:?DB_USER requerido}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
      DB_SSL_MODE: ${DB_SSL_MODE:-DISABLED}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ADMIN_OTP: ${ADMIN_OTP:-123456}
      ADMIN_OTP_SECRET: ${ADMIN_OTP_SECRET:-}
      PAYMENT_GATEWAY_URL: ${PAYMENT_GATEWAY_URL:-https://api.pasarela-mock.com}
      PAYMENT_GATEWAY_KEY: ${PAYMENT_GATEWAY_KEY:-mock_key}
    ports:
      - "4000:4000"
    networks:
      - grandstay-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mysql:
    profiles: ["local-db"]
    image: mysql:8.0
    container_name: grandstay-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD requerido para MySQL local}
      MYSQL_DATABASE: ${DB_NAME:-grandstay_db}
      MYSQL_USER: ${DB_USER:-grandstay_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - grandstay-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local

networks:
  grandstay-net:
    driver: bridge
